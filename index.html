<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>Weather App</title>
</head>

<body>
    <div class="weather-app">
        <header>
            <form class="search-form" id="search-form">
                <input type="search" placeholder="Enter a city ..." required class="search-form-input"
                    id="search-form-input" />
                <input type="submit" value="Search" class="search-form-button" />
            </form>
        </header>
        <main>
            <div class="weather-app-data">
                <div>
                    <h1 class="weather-app-city" id="weather-app-city">
                        Johannesburg
                    </h1>
                    <p class=" weather-app-details">
                        Saturday 22:02, scaterred clouds
                        <br />
                        Humidity: <span class="weather-app-numbers">84%</span>, Wind: <span
                            class="weather-app-numbers">3.13km/h</span>
                    </p>
                </div>
                <div class="weather-app-temp-container">
                    <div class="weather-class-icon">⛅</div>
                    <div class="weather-app-value">13</div>
                    <div class="weather-app-unit"> °C</div>
                </div>
            </div>
        </main>

        <footer>This project was coded by <a href="https://github.com/lesegokgatle" target="_blank"></a>Lesego
            Kgatle</a>
            and
            <a href="https://github.com/lesegokgatle/Weather-App--Lesego" target="_blank">is on Github</a>
            and <a href="https://lesego-weather.netlify.app" target="_blank">hosted on Netlify</a>

        </footer>
    </div>
    <script src="src/index.js"></script>
</body>

</html>
